name: CI

on:
  push:
    branches: [main, develop, "feature/**", "release/**"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── CPU-only tests (multi Rust version matrix) ────────────────────────────
  test:
    name: Test — Rust ${{ matrix.rust }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust: ["1.75", stable]
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Build (CPU path, skip CUDA kernels)
        run: cargo build --workspace
        env:
          # atlas-tensor build.rs checks for CUDA_PATH; if absent, skips CUDA
          CUDA_PATH: ""

      - name: Test (CPU path, GPU tests auto-skipped via #[ignore])
        run: cargo test --workspace
        env:
          CUDA_PATH: ""

  # ── Rustfmt check (advisory) ──────────────────────────────────────────────
  fmt:
    name: Rustfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        continue-on-error: true   # formatting is advisory, not blocking

  # ── Clippy lint (advisory) ────────────────────────────────────────────────
  clippy:
    name: Clippy lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --workspace -- -D warnings
        continue-on-error: true   # lint is advisory for now
        env:
          CUDA_PATH: ""

  # ── GPU tests (self-hosted runner, disabled until available) ─────────────
  gpu-test:
    name: Test (GPU — Tesla T4)
    runs-on: ubuntu-latest
    if: false  # Enable when self-hosted GPU runner is available
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify CUDA
        run: nvidia-smi
      - name: Build all crates (with CUDA)
        run: cargo build --workspace
      - name: Test all crates (including GPU #[ignore] tests)
        run: cargo test --workspace -- --include-ignored

  # ── Benchmarks (on push to main, non-blocking) ────────────────────────────
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Run atlas bench
        run: |
          cargo run --bin atlas -- bench 2>&1 | tee benchmark-results.txt
        env:
          CUDA_PATH: ""
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.txt
          retention-days: 90
